<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#9E6240">
<title>Moja kuharica</title>
<style>
  :root{
    --bg:#FAF6F0; --card:#FFFFFF; --variant:#F1E9DE; --text:#2B2320;
    --grau:#8A8078; --primary:#9E6240; --primary-dark:#7C4A2E; --herz:#B5542A;
    --border:#ECE2D5; --schatten:0 2px 10px rgba(60,40,25,.08);
    --basis:17px;
  }
  html[data-theme="dark"]{
    --bg:#1C1815; --card:#2A2420; --variant:#39322C; --text:#F0E9E0;
    --grau:#A89E93; --primary:#C17A52; --primary-dark:#9E6240; --herz:#D77A4C;
    --border:#39322C; --schatten:0 2px 12px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{font-size:var(--basis);}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    display:flex; justify-content:center; min-height:100vh;
  }
  .app{
    width:100%; max-width:460px; min-height:100vh; background:var(--bg);
    position:relative; display:flex; flex-direction:column;
    box-shadow:0 0 40px rgba(60,40,25,.06);
  }
  @media (min-width:520px){ .app{ min-height:calc(100vh - 40px); margin:20px 0; border-radius:28px; overflow:hidden; } }

  .inhalt{ flex:1; overflow-y:auto; padding:0 20px 120px; -webkit-overflow-scrolling:touch; }
  .kopf{ padding:22px 20px 6px; }
  .kopf h1{ font-size:1.9rem; margin:0; font-weight:800; letter-spacing:-.5px; }
  .kopf p{ margin:2px 0 0; color:var(--grau); font-size:1.05rem; }

  /* Gornja traka za podstranice */
  .leiste{ display:flex; align-items:center; gap:6px; padding:14px 12px 8px; }
  .leiste .titel{ font-size:1.35rem; font-weight:700; flex:1; }
  .ikon-btn{
    border:none; background:transparent; color:var(--text); cursor:pointer;
    width:44px; height:44px; border-radius:50%; font-size:1.4rem; display:flex;
    align-items:center; justify-content:center; flex-shrink:0;
  }
  .ikon-btn:active{ background:var(--variant); }

  /* Traka za pretragu */
  .suche{ position:relative; margin:8px 0 4px; }
  .suche input{
    width:100%; padding:15px 44px 15px 46px; border-radius:28px; border:1.5px solid transparent;
    background:var(--card); color:var(--text); font-size:1.05rem; box-shadow:var(--schatten); outline:none;
  }
  .suche input:focus{ border-color:var(--primary); }
  .suche .lupe{ position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--grau); }
  .suche .leeren{ position:absolute; right:10px; top:50%; transform:translateY(-50%); }

  /* Kartica recepta */
  .karte{
    display:flex; align-items:center; gap:14px; background:var(--card); border-radius:18px;
    padding:13px; margin:12px 0; box-shadow:var(--schatten); cursor:pointer; border:none; width:100%; text-align:left;
    transition:transform .12s ease;
  }
  .karte:active{ transform:scale(.985); }
  .thumb{
    width:66px; height:66px; border-radius:14px; background:var(--variant); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:1.7rem; overflow:hidden;
  }
  .thumb img{ width:100%; height:100%; object-fit:cover; }
  .karte .body{ flex:1; min-width:0; }
  .karte .body .t{ font-weight:700; font-size:1.12rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .karte .body .k{ color:var(--grau); font-size:.98rem; margin-top:2px; }
  .herz{ border:none; background:transparent; cursor:pointer; font-size:1.6rem; width:44px; height:44px; flex-shrink:0; line-height:1; }
  .herz.aus{ filter:grayscale(1) opacity(.35); }

  /* Prazno stanje */
  .leer{ text-align:center; padding:64px 24px; color:var(--grau); }
  .leer .gross{ font-size:3.4rem; }
  .leer h3{ color:var(--text); font-size:1.3rem; margin:14px 0 6px; }
  .leer p{ margin:0; font-size:1.05rem; line-height:1.5; }

  /* Kartice izbora (Dodavanje) */
  .wahl{
    width:100%; background:var(--card); border:none; border-radius:22px; padding:30px 18px; margin:14px 0;
    box-shadow:var(--schatten); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:10px;
    transition:transform .12s ease;
  }
  .wahl:active{ transform:scale(.98); }
  .wahl .kreis{ width:74px; height:74px; border-radius:50%; background:var(--variant); display:flex; align-items:center; justify-content:center; font-size:2.1rem; }
  .wahl .wt{ font-weight:700; font-size:1.25rem; }
  .wahl .ws{ color:var(--grau); font-size:1rem; text-align:center; }

  /* Detalji */
  .held{
    width:100%; height:210px; border-radius:22px; background:var(--variant); overflow:hidden;
    display:flex; align-items:center; justify-content:center; font-size:3.6rem; margin-bottom:16px;
  }
  .held img{ width:100%; height:100%; object-fit:cover; }
  .d-titel{ font-size:1.7rem; font-weight:800; letter-spacing:-.4px; line-height:1.2; }
  .d-kat{ color:var(--grau); font-size:1.08rem; margin-top:2px; }
  .meta{ color:var(--grau); font-size:1rem; margin:10px 0 6px; display:flex; flex-wrap:wrap; gap:14px; }
  .abschnitt{ font-size:1.3rem; font-weight:800; margin:22px 0 8px; }
  .zutat{ display:flex; align-items:flex-start; gap:12px; padding:9px 0; font-size:1.1rem; }
  .zutat input{ width:24px; height:24px; margin-top:2px; accent-color:var(--primary); flex-shrink:0; }
  .zutat.done label{ text-decoration:line-through; color:var(--grau); }
  .schritt{ display:flex; gap:14px; padding:8px 0; font-size:1.1rem; line-height:1.5; }
  .num{ width:30px; height:30px; border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; font-size:.98rem; }
  .notiz{ font-size:1.1rem; line-height:1.6; }

  /* Formular */
  .feld{ margin:14px 0; }
  .feld label{ display:block; font-size:1rem; font-weight:600; color:var(--grau); margin-bottom:6px; }
  .feld input, .feld textarea{
    width:100%; padding:14px; border-radius:14px; border:1.5px solid var(--border); background:var(--card);
    color:var(--text); font-size:1.08rem; font-family:inherit; outline:none;
  }
  .feld input:focus, .feld textarea:focus{ border-color:var(--primary); }
  .feld textarea{ min-height:120px; resize:vertical; line-height:1.5; }
  .reihe{ display:flex; gap:12px; }
  .reihe .feld{ flex:1; }
  .primaer{
    width:100%; padding:17px; border-radius:16px; border:none; background:var(--primary); color:#fff;
    font-size:1.15rem; font-weight:700; cursor:pointer; margin-top:12px;
  }
  .primaer:disabled{ opacity:.5; cursor:not-allowed; }

  /* Postavke */
  .zeile{ display:flex; align-items:center; gap:14px; background:var(--card); border-radius:16px; padding:16px; margin:12px 0; box-shadow:var(--schatten); }
  .zeile .ic{ font-size:1.5rem; width:30px; text-align:center; }
  .zeile .txt{ flex:1; }
  .zeile .txt .a{ font-weight:700; font-size:1.1rem; }
  .zeile .txt .b{ color:var(--grau); font-size:.98rem; }
  .zeile .wert{ color:var(--grau); font-size:1.05rem; }
  .schalter{ position:relative; width:52px; height:30px; flex-shrink:0; }
  .schalter input{ display:none; }
  .schalter .track{ position:absolute; inset:0; background:var(--border); border-radius:999px; transition:.2s; }
  .schalter .knopf{ position:absolute; top:3px; left:3px; width:24px; height:24px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.3); }
  .schalter input:checked + .track{ background:var(--primary); }
  .schalter input:checked + .track + .knopf{ transform:translateX(22px); }

  /* Plutajuće dugme */
  .fab{
    position:absolute; right:18px; bottom:92px; background:var(--primary); color:#fff; border:none;
    border-radius:30px; padding:16px 22px; font-size:1.08rem; font-weight:700; cursor:pointer;
    box-shadow:0 6px 18px rgba(120,74,46,.4); display:flex; align-items:center; gap:8px; z-index:5;
  }
  .fab:active{ transform:scale(.97); }

  /* Donja navigacija */
  .nav{
    position:absolute; left:0; right:0; bottom:0; display:flex; background:var(--card);
    border-top:1px solid var(--border); z-index:6;
  }
  .nav button{
    flex:1; border:none; background:transparent; cursor:pointer; padding:10px 0 12px; color:var(--grau);
    display:flex; flex-direction:column; align-items:center; gap:3px; font-size:.78rem;
  }
  .nav button .ne{ font-size:1.4rem; filter:grayscale(1) opacity(.6); }
  .nav button.aktiv{ color:var(--primary); font-weight:700; }
  .nav button.aktiv .ne{ filter:none; opacity:1; }

  /* Prekrivač (skeniranje/obrada) */
  .overlay{
    position:fixed; inset:0; background:rgba(30,20,12,.72); z-index:20; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; color:#fff; text-align:center; padding:30px;
  }
  .spinner{ width:52px; height:52px; border:5px solid rgba(255,255,255,.25); border-top-color:#fff; border-radius:50%; animation:dreh 1s linear infinite; }
  @keyframes dreh{ to{ transform:rotate(360deg); } }
  .hidden{ display:none !important; }

  .view{ animation:rein .18s ease; }
  @keyframes rein{ from{ opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</head>
<body>
<div class="app">
  <div class="inhalt" id="view"></div>
  <button class="fab hidden" id="fab" onclick="navigate('hinzufuegen')">＋ Dodaj recept</button>
  <nav class="nav" id="nav"></nav>
</div>

<!-- Skriveni prekrivač za OCR / PDF obradu -->
<div class="overlay hidden" id="overlay">
  <div class="spinner"></div>
  <div id="overlay-text" style="font-size:1.15rem;">Prepoznavanje teksta…</div>
</div>

<!-- Skrivena polja za odabir datoteka -->
<input type="file" id="foto-input" accept="image/*" capture="environment" class="hidden">
<input type="file" id="pdf-input" accept="application/pdf" class="hidden">

<script>
/* ============================================================
   Moja kuharica – web aplikacija (samostalni index.html)
   Podaci se čuvaju u pregledniku (localStorage). Bez instalacije.
   ============================================================ */

const SPEICHER = 'kochbuch_rezepte';
const SPEICHER_E = 'kochbuch_einstellungen';

let state = {
  view: 'rezepte',
  param: null,
  suche: '',
  entwurf: null,          // privremeni recept iz skena/PDF-a/ručnog unosa
  abgehakt: new Set()     // lokalno označeni sastojci u detaljima
};

/* ---------- Pohrana ---------- */
function ladeRezepte(){
  try { return JSON.parse(localStorage.getItem(SPEICHER)) || []; }
  catch { return []; }
}
function speichereRezepte(liste){
  try { localStorage.setItem(SPEICHER, JSON.stringify(liste)); return true; }
  catch(e){
    alert('Memorija je puna. Savjet: fotografije se čuvaju umanjene – kod jako puno recepata sa slikom prostor u pregledniku može ponestati.');
    return false;
  }
}
function ladeEinstellungen(){
  try { return Object.assign({darkMode:false, schriftGross:false}, JSON.parse(localStorage.getItem(SPEICHER_E)) || {}); }
  catch { return {darkMode:false, schriftGross:false}; }
}
function speichereEinstellungen(e){ localStorage.setItem(SPEICHER_E, JSON.stringify(e)); }

/* ---------- Pomoćne funkcije ---------- */
function neueId(){ return (crypto.randomUUID && crypto.randomUUID()) || String(Date.now()+Math.random()); }
function esc(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function leeresRezept(){
  return { id:null, titel:'', kategorie:'', zutaten:[], schritte:[], backzeit:'', kochzeit:'',
           temperatur:'', portionen:'', notizen:'', bild:null, pdfName:null, favorit:false, erstelltAm:Date.now() };
}
function rezeptById(id){ return ladeRezepte().find(r=>r.id===id) || null; }

/* Sliku umanji i vrati kao JPEG DataURL (štedi memoriju). */
function bildVerkleinern(datei, maxKante=900, qualitaet=0.72){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let {width:w, height:h} = img;
        if(Math.max(w,h) > maxKante){
          const f = maxKante / Math.max(w,h); w = Math.round(w*f); h = Math.round(h*f);
        }
        const c = document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg', qualitaet));
      };
      img.onerror = () => resolve(null);
      img.src = reader.result;
    };
    reader.onerror = () => resolve(null);
    reader.readAsDataURL(datei);
  });
}

/* Vanjsku biblioteku učitaj po potrebi. */
function ladeSkript(src){
  return new Promise((resolve, reject)=>{
    if(document.querySelector('script[data-src="'+src+'"]')) return resolve();
    const s = document.createElement('script');
    s.src = src; s.dataset.src = src;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('Nije moguće učitati '+src));
    document.head.appendChild(s);
  });
}

/* OCR tekst razdvoji u polja – prepoznaje "Sastojci" i "Priprema". */
function parseOcr(text){
  const r = leeresRezept();
  const zeilen = text.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  if(!zeilen.length) return r;
  r.titel = zeilen[0];
  let modus = 0; // 0 ništa, 1 sastojci, 2 priprema
  for(const z of zeilen.slice(1)){
    const low = z.toLowerCase();
    if(low.startsWith('sastojci') || low.startsWith('zutaten')) modus = 1;
    else if(low.startsWith('priprema') || low.startsWith('priprava') || low.startsWith('postupak') ||
            low.startsWith('zubereitung') || low.startsWith('anleitung') || low.startsWith('schritte')) modus = 2;
    else {
      const sauber = z.replace(/^[-•*\s\t]+/, '').replace(/^\d+[.)]\s*/, '').trim();
      if(sauber){ if(modus===1) r.zutaten.push(sauber); else if(modus===2) r.schritte.push(sauber); }
    }
  }
  return r;
}

/* ---------- Navigacija ---------- */
const HAUPT = ['rezepte','favoriten','kategorien','einstellungen'];
function navigate(view, param=null){
  state.view = view; state.param = param;
  if(view==='detail') state.abgehakt = new Set();
  render();
  document.getElementById('view').scrollTop = 0;
}

/* ---------- Iscrtavanje ---------- */
function render(){
  const app = ladeEinstellungen();
  document.documentElement.dataset.theme = app.darkMode ? 'dark' : 'light';
  document.documentElement.style.fontSize = app.schriftGross ? '21px' : '17px';

  const v = document.getElementById('view');
  const view = state.view;
  let html = '';
  if(view==='rezepte') html = viewRezepte();
  else if(view==='favoriten') html = viewFavoriten();
  else if(view==='kategorien') html = viewKategorien();
  else if(view==='einstellungen') html = viewEinstellungen(app);
  else if(view==='hinzufuegen') html = viewHinzufuegen();
  else if(view==='detail') html = viewDetail();
  else if(view==='bearbeiten') html = viewBearbeiten();
  v.innerHTML = '<div class="view">'+html+'</div>';

  // Donja navigacija + FAB samo na glavnim stranicama
  const bottom = HAUPT.includes(view);
  renderNav(view, bottom);
  const fab = document.getElementById('fab');
  fab.classList.toggle('hidden', !(view==='rezepte' || view==='favoriten'));

  nachRender();
}

function renderNav(view, sichtbar){
  const nav = document.getElementById('nav');
  nav.classList.toggle('hidden', !sichtbar);
  if(!sichtbar){ nav.innerHTML=''; return; }
  const tabs = [
    ['rezepte','🏠','Recepti'], ['favoriten','❤️','Favoriti'],
    ['kategorien','📂','Kategorije'], ['einstellungen','⚙️','Postavke']
  ];
  nav.innerHTML = tabs.map(([id,ic,t])=>
    `<button class="${view===id?'aktiv':''}" onclick="navigate('${id}')">
       <span class="ne">${ic}</span><span>${t}</span>
     </button>`).join('');
}

/* ---------- Prikazi ---------- */
function karteHtml(r){
  const thumb = r.bild ? `<img src="${r.bild}" alt="">`
              : r.pdfName ? '📄' : '📖';
  return `<button class="karte" onclick="navigate('detail','${r.id}')">
      <div class="thumb">${thumb}</div>
      <div class="body">
        <div class="t">${esc(r.titel) || 'Bez naslova'}</div>
        ${r.kategorie ? `<div class="k">${esc(r.kategorie)}</div>` : ''}
      </div>
      <span class="herz ${r.favorit?'':'aus'}" onclick="event.stopPropagation(); favorit('${r.id}')">❤️</span>
    </button>`;
}

function viewRezepte(){
  const q = state.suche.trim().toLowerCase();
  let liste = ladeRezepte().sort((a,b)=>b.erstelltAm-a.erstelltAm);
  if(q){
    liste = liste.filter(r =>
      (r.titel+' '+r.kategorie+' '+r.notizen+' '+r.zutaten.join(' ')).toLowerCase().includes(q));
  }
  const inhalt = liste.length
    ? liste.map(karteHtml).join('')
    : (q ? leerHtml('🔍','Ništa nije pronađeno',`Za „${esc(state.suche)}“ nema odgovarajućeg recepta.`)
         : leerHtml('📖','Još nema recepata','Dodirni „Dodaj recept“ da sačuvaš svoj prvi recept.'));
  return `
    <div class="kopf"><h1>Zdravo, Nani! 👋</h1><p>Tvoja lična kuharica</p></div>
    <div class="suche">
      <span class="lupe">🔍</span>
      <input id="suchfeld" type="text" placeholder="Pretraži recept…" value="${esc(state.suche)}">
      ${state.suche ? '<button class="ikon-btn leeren" onclick="setSuche(\'\')">✕</button>' : ''}
    </div>
    ${inhalt}`;
}

function viewFavoriten(){
  const liste = ladeRezepte().filter(r=>r.favorit).sort((a,b)=>a.titel.localeCompare(b.titel,'bs'));
  return `<div class="kopf"><h1>Favoriti ❤️</h1></div>` +
    (liste.length ? liste.map(karteHtml).join('')
      : leerHtml('❤️','Još nema favorita','Dodirni srce na receptu da ga sačuvaš ovdje.'));
}

function viewKategorien(){
  const alle = ladeRezepte();
  if(!alle.length) return `<div class="kopf"><h1>Kategorije 📂</h1></div>` +
    leerHtml('📂','Još nema recepata','Čim sačuvaš recepte, pojavit će se ovdje razvrstani po kategoriji.');
  const gruppen = {};
  alle.forEach(r=>{ const k = r.kategorie.trim() || 'Bez kategorije'; (gruppen[k]=gruppen[k]||[]).push(r); });
  const keys = Object.keys(gruppen).sort((a,b)=>a.localeCompare(b,'bs'));
  const teile = keys.map(k =>
    `<div class="abschnitt" style="font-size:1.15rem;color:var(--grau);">${esc(k)} (${gruppen[k].length})</div>` +
    gruppen[k].map(karteHtml).join('')
  ).join('');
  return `<div class="kopf"><h1>Kategorije 📂</h1></div>${teile}`;
}

function viewEinstellungen(app){
  return `
    <div class="kopf"><h1>Postavke ⚙️</h1></div>
    <div class="zeile">
      <span class="ic">🌙</span>
      <div class="txt"><div class="a">Tamni izgled</div><div class="b">Čuva oči pri slabom svjetlu</div></div>
      <label class="schalter"><input type="checkbox" id="s-dark" ${app.darkMode?'checked':''}>
        <span class="track"></span><span class="knopf"></span></label>
    </div>
    <div class="zeile">
      <span class="ic">🔠</span>
      <div class="txt"><div class="a">Veliki font</div><div class="b">Prikaži sve malo veće</div></div>
      <label class="schalter"><input type="checkbox" id="s-gross" ${app.schriftGross?'checked':''}>
        <span class="track"></span><span class="knopf"></span></label>
    </div>
    <div class="zeile"><span class="ic">🌐</span><div class="txt"><div class="a">Jezik</div></div><span class="wert">Bosanski</span></div>
    <div class="zeile"><span class="ic">ℹ️</span><div class="txt"><div class="a">Verzija</div></div><span class="wert">1.0 · Web</span></div>
    <p style="color:var(--grau); text-align:center; font-size:.95rem; margin-top:18px; line-height:1.5;">
      Svi recepti se čuvaju samo lokalno u ovom pregledniku.</p>`;
}

function viewHinzufuegen(){
  return `
    ${leisteHtml('Dodaj recept','rezepte')}
    <p style="color:var(--grau); font-size:1.08rem; margin:4px 2px 8px;">Kako želiš dodati recept?</p>
    <button class="wahl" onclick="starteFoto()">
      <div class="kreis">📷</div><div class="wt">Skeniraj fotografiju</div>
      <div class="ws">Fotografiši ručno pisani recept</div></button>
    <button class="wahl" onclick="startePdf()">
      <div class="kreis">📄</div><div class="wt">Dodaj PDF</div>
      <div class="ws">Uvezi recept iz PDF datoteke</div></button>
    <button class="wahl" onclick="manuellNeu()">
      <div class="kreis">✏️</div><div class="wt">Unesi ručno</div>
      <div class="ws">Upiši recept ručno</div></button>`;
}

function viewDetail(){
  const r = rezeptById(state.param);
  if(!r) return leisteHtml('Recept','rezepte') + leerHtml('❓','Nije pronađeno','Ovaj recept više ne postoji.');
  const held = r.bild ? `<img src="${r.bild}" alt="">` : (r.pdfName ? '📄' : '📖');
  const meta = [];
  if(r.portionen) meta.push('🍽️ '+esc(r.portionen));
  if(r.kochzeit) meta.push('⏱️ '+esc(r.kochzeit));
  if(r.backzeit) meta.push('🔥 '+esc(r.backzeit));
  if(r.temperatur) meta.push('🌡️ '+esc(r.temperatur));

  const zutaten = r.zutaten.length ? `<div class="abschnitt">Sastojci</div>` + r.zutaten.map((z,i)=>{
    const done = state.abgehakt.has(i);
    return `<div class="zutat ${done?'done':''}">
      <input type="checkbox" id="z${i}" ${done?'checked':''} onchange="hakAb(${i})">
      <label for="z${i}">${esc(z)}</label></div>`;
  }).join('') : '';

  const schritte = r.schritte.length ? `<div class="abschnitt">Priprema</div>` + r.schritte.map((s,i)=>
    `<div class="schritt"><div class="num">${i+1}</div><div>${esc(s)}</div></div>`).join('') : '';

  const notizen = r.notizen ? `<div class="abschnitt">Bilješke</div><div class="notiz">${esc(r.notizen)}</div>` : '';
  const pdf = r.pdfName ? `<p style="color:var(--grau);font-size:.98rem;">📎 Uvezena datoteka: ${esc(r.pdfName)}</p>` : '';

  return `
    ${leisteHtml('Recept','rezepte', `
      <button class="ikon-btn" title="Uredi" onclick="navigate('bearbeiten','${r.id}')">✏️</button>
      <button class="ikon-btn" title="Podijeli" onclick="teile('${r.id}')">🔗</button>
      <button class="ikon-btn" title="Obriši" onclick="loesche('${r.id}')">🗑️</button>`)}
    <div class="held">${held}</div>
    <div style="display:flex; align-items:flex-start;">
      <div style="flex:1;">
        <div class="d-titel">${esc(r.titel)||'Bez naslova'}</div>
        ${r.kategorie?`<div class="d-kat">${esc(r.kategorie)}</div>`:''}
      </div>
      <span class="herz ${r.favorit?'':'aus'}" style="font-size:2rem;" onclick="favorit('${r.id}')">❤️</span>
    </div>
    ${meta.length?`<div class="meta">${meta.join('')}</div>`:''}
    ${pdf}${zutaten}${schritte}${notizen}
    <div style="height:20px;"></div>`;
}

function viewBearbeiten(){
  const neu = !state.param;
  const r = neu ? (state.entwurf || leeresRezept()) : rezeptById(state.param);
  if(!r) return leisteHtml('Uredi','rezepte') + leerHtml('❓','Nije pronađeno','Ovaj recept više ne postoji.');
  return `
    ${leisteHtml(neu?'Novi recept':'Uredi','zurueck')}
    <div class="feld"><label>Naslov</label><input id="f-titel" value="${esc(r.titel)}" placeholder="npr. Pita od jabuka"></div>
    <div class="feld"><label>Kategorija</label><input id="f-kat" value="${esc(r.kategorie)}" placeholder="npr. Kolač, Supa, Glavno jelo"></div>
    <div class="feld"><label>Sastojci (jedan po redu)</label><textarea id="f-zutaten" placeholder="Jedan sastojak po redu, npr.:&#10;200 g brašna&#10;3 jaja&#10;1 prstohvat soli">${esc(r.zutaten.join('\n'))}</textarea></div>
    <div class="feld"><label>Priprema (jedan korak po redu)</label><textarea id="f-schritte" placeholder="Jedan korak po redu, npr.:&#10;Zagrij pećnicu&#10;Sjedini sastojke&#10;Peci 45 minuta">${esc(r.schritte.join('\n'))}</textarea></div>
    <div class="reihe">
      <div class="feld"><label>Porcije</label><input id="f-portionen" value="${esc(r.portionen)}" placeholder="4"></div>
      <div class="feld"><label>Vrijeme kuhanja</label><input id="f-kochzeit" value="${esc(r.kochzeit)}" placeholder="30 min"></div>
    </div>
    <div class="reihe">
      <div class="feld"><label>Vrijeme pečenja</label><input id="f-backzeit" value="${esc(r.backzeit)}" placeholder="45 min"></div>
      <div class="feld"><label>Temperatura</label><input id="f-temp" value="${esc(r.temperatur)}" placeholder="180 °C"></div>
    </div>
    <div class="feld"><label>Bilješke</label><textarea id="f-notizen" placeholder="Savjeti, varijante, podsjetnici …">${esc(r.notizen)}</textarea></div>
    <button class="primaer" onclick="speichereFormular()">Sačuvaj recept</button>
    <div style="height:30px;"></div>`;
}

/* Gradivni elementi */
function leisteHtml(titel, zurueck, aktionen=''){
  const back = zurueck==='zurueck'
    ? `onclick="if(state.param){navigate('detail',state.param)}else{navigate('hinzufuegen')}"`
    : `onclick="navigate('${zurueck}')"`;
  return `<div class="leiste">
    <button class="ikon-btn" ${back} title="Nazad">←</button>
    <span class="titel">${titel}</span>${aktionen}</div>`;
}
function leerHtml(ic,t,p){ return `<div class="leer"><div class="gross">${ic}</div><h3>${t}</h3><p>${p}</p></div>`; }

/* ---------- Nakon iscrtavanja: poveži događaje ---------- */
function nachRender(){
  const suchfeld = document.getElementById('suchfeld');
  if(suchfeld){
    suchfeld.oninput = e => { state.suche = e.target.value; liveSuche(); };
  }
  const dark = document.getElementById('s-dark');
  if(dark) dark.onchange = e => { const a=ladeEinstellungen(); a.darkMode=e.target.checked; speichereEinstellungen(a); render(); };
  const gross = document.getElementById('s-gross');
  if(gross) gross.onchange = e => { const a=ladeEinstellungen(); a.schriftGross=e.target.checked; speichereEinstellungen(a); render(); };
}

/* Pretraga uživo bez gubitka fokusa: osvježi cijeli prikaz i vrati fokus */
function liveSuche(){
  if(state.view!=='rezepte') return;
  const feld = document.getElementById('suchfeld');
  const pos = feld ? feld.selectionStart : null;
  render();
  const neu = document.getElementById('suchfeld');
  if(neu){ neu.focus(); if(pos!=null){ try{ neu.setSelectionRange(pos,pos); }catch{} } }
}
function setSuche(v){ state.suche = v; render(); }

/* ---------- Radnje ---------- */
function favorit(id){
  const liste = ladeRezepte();
  const r = liste.find(x=>x.id===id);
  if(r){ r.favorit = !r.favorit; speichereRezepte(liste); render(); }
}
function hakAb(i){
  if(state.abgehakt.has(i)) state.abgehakt.delete(i); else state.abgehakt.add(i);
  render();
}
function loesche(id){
  const r = rezeptById(id);
  if(!r) return;
  if(confirm(`Trajno obrisati „${r.titel||'ovaj recept'}“?`)){
    speichereRezepte(ladeRezepte().filter(x=>x.id!==id));
    navigate('rezepte');
  }
}
function teile(id){
  const r = rezeptById(id); if(!r) return;
  let t = (r.titel||'Recept')+'\n';
  if(r.zutaten.length){ t += '\nSastojci:\n' + r.zutaten.map(z=>'- '+z).join('\n') + '\n'; }
  if(r.schritte.length){ t += '\nPriprema:\n' + r.schritte.map((s,i)=>(i+1)+'. '+s).join('\n') + '\n'; }
  if(r.notizen){ t += '\nBilješke:\n'+r.notizen; }
  if(navigator.share){ navigator.share({title:r.titel||'Recept', text:t}).catch(()=>{}); }
  else { navigator.clipboard?.writeText(t).then(()=>alert('Recept kopiran u međuspremnik.'), ()=>alert(t)); }
}

function manuellNeu(){ state.entwurf = leeresRezept(); navigate('bearbeiten', null); }

function speichereFormular(){
  const g = id => (document.getElementById(id)?.value || '');
  const zeilen = t => t.split(/\n/).map(s=>s.trim()).filter(Boolean);
  const titel = g('f-titel').trim();
  if(!titel){ alert('Molimo unesi barem naslov.'); return; }

  const basis = state.param ? rezeptById(state.param) : (state.entwurf || leeresRezept());
  const rezept = Object.assign({}, basis, {
    id: basis.id || neueId(),
    titel, kategorie: g('f-kat').trim(),
    zutaten: zeilen(g('f-zutaten')), schritte: zeilen(g('f-schritte')),
    portionen: g('f-portionen').trim(), kochzeit: g('f-kochzeit').trim(),
    backzeit: g('f-backzeit').trim(), temperatur: g('f-temp').trim(),
    notizen: g('f-notizen').trim(),
    erstelltAm: basis.erstelltAm || Date.now()
  });

  const liste = ladeRezepte();
  const idx = liste.findIndex(x=>x.id===rezept.id);
  if(idx>=0) liste[idx] = rezept; else liste.unshift(rezept);
  if(speichereRezepte(liste)){ state.entwurf=null; navigate('detail', rezept.id); }
}

/* ---------- Skeniranje fotografije (OCR) ---------- */
function starteFoto(){ document.getElementById('foto-input').click(); }
document.getElementById('foto-input').addEventListener('change', async function(e){
  const datei = e.target.files[0]; this.value='';
  if(!datei) return;
  zeigeOverlay('Priprema slike…');
  const bild = await bildVerkleinern(datei);
  try{
    zeigeOverlay('Prepoznavanje teksta…\n(prvi put traje malo duže)');
    await ladeSkript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
    const { data } = await Tesseract.recognize(bild, 'bos', {
      logger: m => { if(m.status==='recognizing text') setOverlayText('Prepoznavanje teksta… '+Math.round(m.progress*100)+'%'); }
    });
    const r = parseOcr(data.text || '');
    r.bild = bild;
    state.entwurf = r;
  }catch(err){
    const r = leeresRezept(); r.bild = bild;
    state.entwurf = r;
    alert('Prepoznavanje teksta trenutno nije dostupno (potreban je internet). Fotografija je preuzeta – polja možeš popuniti ručno.');
  }finally{
    versteckeOverlay();
    navigate('bearbeiten', null);
  }
});

/* ---------- Uvoz PDF-a ---------- */
function startePdf(){ document.getElementById('pdf-input').click(); }
document.getElementById('pdf-input').addEventListener('change', async function(e){
  const datei = e.target.files[0]; this.value='';
  if(!datei) return;
  zeigeOverlay('Čitanje PDF-a…');
  const r = leeresRezept(); r.pdfName = datei.name;
  try{
    await ladeSkript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const buf = await datei.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    let text = '';
    for(let i=1;i<=pdf.numPages;i++){
      const seite = await pdf.getPage(i);
      const inhalt = await seite.getTextContent();
      text += inhalt.items.map(it=>it.str).join(' ') + '\n';
    }
    text = text.replace(/\s{2,}/g,' ').trim();
    if(text){
      const geparst = parseOcr(text);
      r.titel = geparst.titel || datei.name.replace(/\.pdf$/i,'');
      r.zutaten = geparst.zutaten; r.schritte = geparst.schritte;
      if(!r.zutaten.length && !r.schritte.length) r.notizen = text.slice(0,2000);
    } else {
      r.titel = datei.name.replace(/\.pdf$/i,'');
    }
  }catch(err){
    r.titel = datei.name.replace(/\.pdf$/i,'');
    alert('Tekst iz PDF-a nije moguće automatski pročitati. Datoteka je dodana kao recept – polja dopuni ručno.');
  }finally{
    state.entwurf = r;
    versteckeOverlay();
    navigate('bearbeiten', null);
  }
});

/* ---------- Prekrivač ---------- */
function zeigeOverlay(t){ setOverlayText(t); document.getElementById('overlay').classList.remove('hidden'); }
function setOverlayText(t){ document.getElementById('overlay-text').textContent = t; }
function versteckeOverlay(){ document.getElementById('overlay').classList.add('hidden'); }

/* ---------- Start ---------- */
render();
</script>
